<script>

//const API_URL = "http://127.0.0.1:8000/api/metrics";
const API_URL = "https://cpfbackend2-0.onrender.com/api/metrics"

let copChartInstance = null;
let allRecords = [];

function updateClock() {
    const now = new Date();
    const timeStr = now.toLocaleString('th-TH', {
        timeZone: 'Asia/Bangkok',
        day:    '2-digit',
        month:  'short',
        year:   'numeric',
        hour:   '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
    });
    document.getElementById("clock-display").innerText = "🕐 " + timeStr;
}
updateClock();
setInterval(updateClock, 1000);

function switchPage(pageName) {

    const dashboard = document.getElementById("page-dashboard");
    const form = document.getElementById("page-form");

    const dashBtn = document.getElementById("tab-dash-btn");
    const formBtn = document.getElementById("tab-form-btn");

    const indicator = document.getElementById("tab-indicator");

    dashboard.classList.toggle("hidden", pageName !== 'dashboard');
    form.classList.toggle("hidden", pageName !== 'form');

    if (pageName === 'dashboard') {

        indicator.style.transform = "translateX(0px)";

        dashBtn.classList.remove("text-slate-300");
        dashBtn.classList.add("text-white");

        formBtn.classList.remove("text-white");
        formBtn.classList.add("text-slate-300");

        fetchDashboardData();

    } else {

        indicator.style.transform = "translateX(158px)";

        formBtn.classList.remove("text-slate-300");
        formBtn.classList.add("text-white");

        dashBtn.classList.remove("text-white");
        dashBtn.classList.add("text-slate-300");
    }
}

async function fetchDashboardData() {

    const compressorId =
        document.getElementById("comp-select").value;

    const startVal = document.getElementById("date-start").value;
    const endVal   = document.getElementById("date-end").value;

    let url = `${API_URL}/${compressorId}?limit=2000`;

    if (startVal) {
        url += `&start=${encodeURIComponent(new Date(startVal).toISOString())}`;
    }
    if (endVal) {
        url += `&end=${encodeURIComponent(new Date(endVal).toISOString())}`;
    }

    // Update range display
    const rangeDisplay = document.getElementById("range-display");
    const rangeLabel   = document.getElementById("range-label");
    if (startVal || endVal) {
        const from = startVal ? formatThaiTime(new Date(startVal).toISOString()) : "ตั้งแต่ต้น";
        const to   = endVal   ? formatThaiTime(new Date(endVal).toISOString())   : "ปัจจุบัน";
        rangeLabel.innerText = `${from} — ${to}`;
        rangeDisplay.classList.remove("hidden");
    } else {
        rangeDisplay.classList.add("hidden");
    }

    try {

        const response =
            await fetch(url);

        const data = await response.json();

        if (data.length === 0) {
            clearDashboard();
            const connStatus = document.getElementById("connection-status");
            connStatus.innerText = "● LIVE";
            connStatus.classList.remove("bg-gray-500", "bg-red-500");
            connStatus.classList.add("bg-green-500", "text-white");
            return;
        }

        const latest = data[0].diagnosis;

        // ===== WARNING CHECK =====

        let superheatWarning = "";
        let subcoolWarning = "";
        let prWarning = "";
        let copWarning = "";

        // Superheat
        if (latest.superheat_suc < 0) {
            superheatWarning = " ⚠️ Floodback Risk";
        } else if (latest.superheat_suc > 15) {
            superheatWarning = " ⚠️ High Superheat";
        }

        // Subcooling
        if (latest.subcooling < 2) {
            subcoolWarning = " ⚠️ Low Subcooling";
        } else if (latest.subcooling > 15) {
            subcoolWarning = " ⚠️ High Subcooling";
        }

        // Pressure Ratio
        if (latest.pressure_ratio > 10) {
            prWarning = " ⚠️ High Compression Ratio";
        }

        // COP
        if (latest.actual_cop < 1.5) {
            copWarning = " ⚠️ Low Efficiency";
        }

        // ===== SET CARD =====

document.getElementById("card-actual-cop")
    .innerHTML = `
        ${latest.actual_cop}
        ${copWarning
            ? `<div class="text-sm text-red-400 mt-1 font-semibold">${copWarning}</div>`
            : ""}
    `;

document.getElementById("card-system-cop")
    .innerText = latest.system_cop;

document.getElementById("card-ql")
    .innerText = latest.calculated_ql_kw + " kW";

document.getElementById("card-superheat")
    .innerHTML = `
        ${latest.superheat_suc} °C
        ${superheatWarning
            ? `<div class="text-sm text-red-500 mt-1 font-semibold">${superheatWarning}</div>`
            : ""}
    `;

document.getElementById("card-subcool")
    .innerHTML = `
        ${latest.subcooling} °C
        ${subcoolWarning
            ? `<div class="text-sm text-red-500 mt-1 font-semibold">${subcoolWarning}</div>`
            : ""}
    `;

document.getElementById("card-pr")
    .innerHTML = `
        ${latest.pressure_ratio}
        ${prWarning
            ? `<div class="text-sm text-red-500 mt-1 font-semibold">${prWarning}</div>`
            : ""}
    `;

        buildDiagnosisReport(latest);

        buildAlarmLog(data);

        allRecords = data;
        clearTimestampBadge();

        renderCharts(data);

        const connStatus = document.getElementById("connection-status");
        connStatus.innerText = "● LIVE";
        connStatus.classList.remove("bg-gray-500"); // ลบสีเทาออก
        connStatus.classList.add("bg-green-500", "text-white");

    } catch (err) {
    const connStatus = document.getElementById("connection-status");
    connStatus.innerText = "● ERROR";
    connStatus.classList.remove("bg-green-500"); // ลบสีเขียวออก
    connStatus.classList.add("bg-red-500" , "text-white");     // เพิ่มสีเทา
    }
}

function buildDiagnosisReport(diag) {

    const container = document.getElementById("diagnosis-report-container");

    const rows = [
        { label: "Cooling Capacity",  value: diag.calculated_ql_kw, unit: "kW" },
        { label: "Compressor Power",  value: diag.power_kw,          unit: "kW" },
        { label: "Actual COP",        value: diag.actual_cop,        unit: "" },
        { label: "System COP",        value: diag.system_cop,        unit: "" },
        { label: "Cycle COP",         value: diag.cycle_cop,         unit: "" },
        { label: "Superheat",         value: diag.superheat_suc,     unit: "°C" },
        { label: "Subcooling",        value: diag.subcooling,        unit: "°C" },
        { label: "Pressure Ratio",    value: diag.pressure_ratio,    unit: "" },
    ];

    const sensorStatus  = diag.systems?.sensor?.status  ?? "Unknown";
    const sensorText    = diag.systems?.sensor?.text    ?? "--";
    const condenserStatus = diag.systems?.condenser?.status ?? "Unknown";

    const statusColor = s =>
        s === "Normal"  ? "text-emerald-600" :
        s === "Warning" ? "text-amber-600"   :
        s === "Critical"? "text-red-600"     : "text-gray-400";

    let html = `<div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b text-left text-gray-500 text-xs uppercase">
                    <th class="pb-2 pr-4">Parameter</th>
                    <th class="pb-2 pr-4">Value</th>
                    <th class="pb-2">Unit</th>
                </tr>
            </thead>
            <tbody>`;

    rows.forEach(row => {
        const val = (row.value === null || row.value === undefined) ? "--" : row.value;
        html += `<tr class="border-b last:border-0">
            <td class="py-2 pr-4 font-medium text-gray-600">${row.label}</td>
            <td class="py-2 pr-4 font-bold text-gray-900">${val}</td>
            <td class="py-2 text-gray-400">${row.unit}</td>
        </tr>`;
    });

    html += `</tbody></table></div>
    <div class="mt-4 flex gap-4 text-xs flex-wrap">
        <span class="font-semibold">Sensor: <span class="${statusColor(sensorStatus)}">${sensorStatus}</span> — ${sensorText}</span>
        <span class="font-semibold">Condenser: <span class="${statusColor(condenserStatus)}">${condenserStatus}</span></span>
    </div>`;

    container.innerHTML = html;
}

function buildAlarmLog(records, singleRecord = false) {

    const container = document.getElementById("alarm-log-container");

    let html = "";
    let hasAlarm = false;
    let alarmCount = 0;
    const MAX_ALARMS = singleRecord ? Infinity : 60;

    records.forEach(record => {

        const alarms = record.diagnosis.alarms || [];

        alarms.forEach(alarm => {

            if (alarmCount >= MAX_ALARMS) return;

            hasAlarm = true;
            alarmCount++;

            const isCritical = alarm.severity === "Critical";

            const cardBg     = isCritical ? "background:#fef2f2;border:1px solid #fca5a5;" : "background:#fffbeb;border:1px solid #fcd34d;";
            const titleColor = isCritical ? "color:#b91c1c;" : "color:#b45309;";
            const icon       = isCritical ? "🔴" : "🟡";

            html += `
                <div class="p-4 rounded-xl mb-3" style="${cardBg}">

                    <div class="flex justify-between items-center mb-2">

                        <div class="font-bold" style="${titleColor}">
                            ${icon} ${alarm.title}
                        </div>

                        <div class="text-xs text-gray-500">
                            ${formatThaiTime(record.timestamp)}
                        </div>

                    </div>

                    <p class="text-sm text-gray-700 mb-2">
                        ${alarm.message}
                    </p>

                    <div class="text-xs text-gray-600 mb-2">
                        <b>Possible Causes:</b>
                        <ul class="list-disc ml-5">
                            ${alarm.possible_causes.map(c => `<li>${c}</li>`).join("")}
                        </ul>
                    </div>

                    <div class="text-xs text-blue-700">
                        <b>Recommendation:</b>
                        <ul class="list-disc ml-5">
                            ${alarm.recommendation.map(r => `<li>${r}</li>`).join("")}
                        </ul>
                    </div>

                </div>
            `;
        });
    });

    container.innerHTML = hasAlarm
        ? html
        : `
            <div class="p-4 bg-emerald-50 border border-emerald-200 rounded-xl text-emerald-700 font-semibold">
                ✅ ไม่พบ Alarm
            </div>
        `;
}

function setTimestampBadge(timestampStr) {
    const label = formatThaiTime(timestampStr);
    ["report", "alarm"].forEach(prefix => {
        document.getElementById(`${prefix}-timestamp-badge`).classList.remove("hidden");
        document.getElementById(`${prefix}-timestamp-label`).innerText = label;
    });
}

function clearTimestampBadge() {
    ["report", "alarm"].forEach(prefix => {
        document.getElementById(`${prefix}-timestamp-badge`).classList.add("hidden");
    });
}

function showRecordAtIndex(index) {
    // records are reversed in processedData, so index maps to allRecords reversed
    const reversed = [...allRecords].reverse();
    const record = reversed[index];
    if (!record) return;

    setTimestampBadge(record.timestamp);
    buildDiagnosisReport(record.diagnosis);
    buildAlarmLog([record], true);
}

function renderCharts(records) {

    const processedData = [...records]
        .reverse()
        .map(r => {

            const d = r.diagnosis || {};

            return {

                timestamp: r.timestamp,

                actual:
                    isNaN(Number(d.actual_cop))
                    ? null
                    : Number(d.actual_cop),

                system:
                    isNaN(Number(d.system_cop))
                    ? null
                    : Number(d.system_cop),

                cycle:
                    isNaN(Number(d.cycle_cop))
                    ? null
                    : Number(d.cycle_cop)
            };
        });

    const labels = processedData.map(r =>
        formatThaiTime(r.timestamp)
    );
    // ปรับความกว้างกราฟตามจำนวนข้อมูล
        const chartWrapper = document.getElementById("chart-wrapper");

        const dynamicWidth = Math.max(
            records.length * 45, // 45px ต่อจุด
            1200                 // ขั้นต่ำ
        );

        chartWrapper.style.width = dynamicWidth + "px";

    const ctx = document
        .getElementById('copChart')
        .getContext('2d');

    if (copChartInstance) {
        copChartInstance.destroy();
    }

    copChartInstance = new Chart(ctx, {

        type: 'line',

        data: {

            labels,

            datasets: [

                {
                    label: 'Actual COP',
                    data: processedData.map(r => r.actual),
                    borderColor: 'green',
                    tension: 0.3,
                    spanGaps: true,
                    pointHoverRadius: 8,
                    pointHoverBackgroundColor: 'green',
                },

                {
                    label: 'System COP',
                    data: processedData.map(r => r.system),
                    borderColor: 'orange',
                    tension: 0.3,
                    spanGaps: true,
                    pointHoverRadius: 8,
                    pointHoverBackgroundColor: 'orange',
                },

                {
                    label: 'Cycle COP',
                    data: processedData.map(r => r.cycle),
                    borderColor: 'pink',
                    tension: 0.3,
                    spanGaps: true,
                    pointHoverRadius: 8,
                    pointHoverBackgroundColor: 'pink',
                }
            ]
        },

        options: {

            responsive: true,

            maintainAspectRatio: false,

            onClick(event, elements) {
                if (elements.length === 0) return;
                const index = elements[0].index;
                showRecordAtIndex(index);

                // Scroll up to report section
                document.getElementById("diagnosis-report-container")
                    .scrollIntoView({ behavior: "smooth", block: "start" });
            },

            onHover(event, elements) {
                event.native.target.style.cursor =
                    elements.length > 0 ? "pointer" : "default";
            },

            scales: {

                y: {
                    beginAtZero: true
                }
            },

            plugins: {
                tooltip: {
                    callbacks: {
                        footer(items) {
                            return "คลิกเพื่อดู Report ณ เวลานี้";
                        }
                    }
                }
            }
        }
    });
}

function formatThaiTime(dateStr) {

    if (!dateStr) return "--";

    return new Date(dateStr).toLocaleString(
        "th-TH",
        {
            timeZone: "Asia/Bangkok",
            hour12: false
        }
    );
}

async function submitForm(event) {

    event.preventDefault();

    const payload = {

        compressor_id:
            document.getElementById("form-comp-id").value,

        sp_kg:
            parseFloat(document.getElementById("form-sp").value),

        st_c:
            parseFloat(document.getElementById("form-st").value),

        dp_kg:
            parseFloat(document.getElementById("form-dp").value),

        dt_c:
            parseFloat(document.getElementById("form-dt").value),

        liquid_temp_c:
            parseFloat(document.getElementById("form-liq-temp").value),

        mass_flow_kg_s:
            parseFloat(document.getElementById("form-mass-flow").value),

        current_amp:
            parseFloat(document.getElementById("form-amp").value),

        fan_pump_kw:
            parseFloat(document.getElementById("form-fan-pump").value),

        evaporator_room_temp_c:
            parseFloat(document.getElementById("form-room-temp").value),

        condenser_temp_c:
            parseFloat(document.getElementById("form-cond-temp").value)

    };

    try {

        const response = await fetch(API_URL, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(payload)

        });

        if (response.ok) {

            alert("บันทึกสำเร็จ");

            document.getElementById("scada-form").reset();

            switchPage('dashboard');

        } else {

            alert("บันทึกไม่สำเร็จ");
        }

    } catch {

        alert("Server Error");
    }
}

function clearDashboard() {
    // Reset all cards to --
    ["card-actual-cop","card-system-cop","card-ql","card-superheat","card-subcool","card-pr"].forEach(id => {
        document.getElementById(id).innerHTML = "--";
    });
    // Reset report
    document.getElementById("diagnosis-report-container").innerHTML =
        `<div class="p-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-500 text-center font-semibold">
            No data found for the selected range
        </div>`;
    // Reset alarm log
    document.getElementById("alarm-log-container").innerHTML =
        `<div class="p-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-500 text-center font-semibold">
            No data found for the selected range
        </div>`;
    // Reset chart
    const ctx = document.getElementById('copChart').getContext('2d');
    if (copChartInstance) { copChartInstance.destroy(); copChartInstance = null; }
    copChartInstance = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'Actual COP', data: [], borderColor: 'green' },
            { label: 'System COP', data: [], borderColor: 'orange' },
            { label: 'Cycle COP',  data: [], borderColor: 'pink' }
        ]},
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: { display: true, text: 'No data found for the selected range', font: { size: 16 }, color: '#94a3b8' }
            },
            scales: { y: { beginAtZero: true } }
        }
    });
}

function toLocalDatetimeInput(date) {
    // Convert Date to local datetime-local string (YYYY-MM-DDTHH:mm)
    const pad = n => String(n).padStart(2, '0');
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function setRange(days) {
    const now = new Date();
    const past = new Date(now.getTime() - days * 24 * 60 * 60 * 1000);
    document.getElementById("date-start").value = toLocalDatetimeInput(past);
    document.getElementById("date-end").value   = toLocalDatetimeInput(now);

    // Highlight active shortcut button
    document.querySelectorAll(".shortcut-btn").forEach(btn => {
        btn.classList.remove("bg-blue-600", "text-white");
        btn.classList.add("bg-slate-100", "text-slate-700");
    });
    event.target.classList.remove("bg-slate-100", "text-slate-700");
    event.target.classList.add("bg-blue-600", "text-white");

    fetchDashboardData();
}

function clearRange() {
    document.getElementById("date-start").value = "";
    document.getElementById("date-end").value   = "";
    document.querySelectorAll(".shortcut-btn").forEach(btn => {
        btn.classList.remove("bg-blue-600", "text-white");
        btn.classList.add("bg-slate-100", "text-slate-700");
    });
    document.getElementById("range-display").classList.add("hidden");
    fetchDashboardData();
}

window.onload = fetchDashboardData;

</script>
